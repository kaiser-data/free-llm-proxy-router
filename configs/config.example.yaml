# picoclaw-free-llm configuration
# IMPORTANT: Free tier limits change without notice.
# Run: picoclaw-scan refresh-llm  to update with current limits.
# Live limits tracker: https://github.com/cheahjs/free-llm-api-resources

proxy:
  port: 8080
  auth_token: ""       # Set to require a Bearer token on incoming requests
  cache_ttl: 300       # Response cache TTL in seconds (0 to disable)
  log_level: "info"
  strategy: "adaptive" # Default strategy: adaptive, performance, speed, volume, balanced,
                        # small, tiny, coding, long_context, similar, parallel, reliable, economical

  strategy_overrides:
    performance:   { max_tokens_cap: 2048 }
    small:         { max_tokens_cap: 256 }
    tiny:          { max_tokens_cap: 128 }
    speed:         { max_tokens_cap: 512 }
    parallel:      { fan_out: 3 }

  similar:
    model_family: "llama-3.1-70b"

fallback:
  retry_on_429: true
  retry_on_5xx: true
  max_attempts: 5
  # Cerebras-specific: add spacing between requests to avoid RPS spikes
  cerebras_request_spacing_ms: 100

refresh:
  model: "groq/llama-3.3-70b-versatile"
  provider: "groq"
  schedule: "weekly"
  prompt_file: "configs/refresh-prompt.txt"
  web_search: true
  output_merge: "conservative"

catalog:
  path: "~/.picoclaw-free-llm/catalog.json"
  enriched_path: "~/.picoclaw-free-llm/enriched.json"
  max_age_hours: 24
  auto_scan_on_start: false

providers:

  - id: openrouter
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    enabled: true
    priority: 1   # First: native multi-model fallback via models[] array
    timeout: "30s"
    extra_headers:
      HTTP-Referer: "https://github.com/kaiser-data/picoclaw-free-llm"
      X-Title: "PicoClaw Free LLM"
    discovery:
      models_endpoint: "/v1/models"
      free_detect_field: "pricing.prompt"
      free_detect_value: "0"
      free_markers: [":free"]
      probe_for_free: false
    native_features:
      enabled: true
      free_router_model: "openrouter/free"

  - id: groq
    name: "Groq"
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"
    enabled: true
    priority: 2
    timeout: "15s"
    native_features:
      service_tier: "auto"
    discovery:
      models_endpoint: "/openai/v1/models"
      all_free: true
    rate_limit_notes: "Per-model limits. x-ratelimit-reset-* uses Go duration strings (e.g. '1m0s'). No Retry-After header."

  - id: gemini
    name: "Google AI Studio"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    auth_header: "x-goog-api-key"
    auth_prefix: ""
    api_key_env: "GEMINI_API_KEY"
    enabled: true
    priority: 3
    timeout: "30s"
    discovery:
      models_endpoint: "https://generativelanguage.googleapis.com/v1beta/models"
    rate_limit_notes: "4 dimensions: RPM/TPM/RPD/IPM. Per GCP project. RPD resets midnight PT."
    preferred_volume_model: "gemini-2.0-flash-lite"

  - id: mistral
    name: "Mistral AI"
    base_url: "https://api.mistral.ai/v1"
    api_key_env: "MISTRAL_API_KEY"
    enabled: false
    priority: 4
    timeout: "30s"
    rate_limit_notes: "Workspace-level limits. Only 2 RPM free tier. Always read Retry-After header."

  - id: cerebras
    name: "Cerebras"
    base_url: "https://api.cerebras.ai/v1"
    api_key_env: "CEREBRAS_API_KEY"
    enabled: false
    priority: 5
    timeout: "15s"
    rate_limit_notes: "RPS limits (not RPM). x-ratelimit-reset-tokens is fractional float seconds. Space requests 100ms."

  - id: together
    name: "Together AI"
    base_url: "https://api.together.xyz/v1"
    api_key_env: "TOGETHER_API_KEY"
    enabled: false
    priority: 6
    timeout: "30s"
    tier_type: "credit"

  - id: deepseek
    name: "DeepSeek"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    enabled: false
    priority: 7
    timeout: "60s"
    tier_type: "credit"

  - id: cohere
    name: "Cohere"
    base_url: "https://api.cohere.ai/v1"
    api_key_env: "COHERE_API_KEY"
    enabled: false
    priority: 8
    timeout: "30s"
    extra_headers:
      Cohere-Version: "2022-12-06"
    rate_limit_notes: "1000 req/MONTH (not per day). Monthly reset."

  - id: nvidia-nim
    name: "NVIDIA NIM"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    enabled: false
    priority: 9
    timeout: "30s"
    tier_type: "credit"
    rate_limit_notes: "40 RPM hard limit regardless of credits."

  - id: huggingface
    name: "Hugging Face Inference"
    base_url: "https://api-inference.huggingface.co/v1"
    api_key_env: "HF_API_KEY"
    enabled: false
    priority: 10
    timeout: "120s"
    rate_limit_notes: "300 calls/hour/token. 503+loading = cold start; wait then retry SAME provider."
    discovery:
      skip_models_endpoint: true
      hub_api_filters: "pipeline_tag=text-generation&inference=warm&gated=false&limit=50"

  - id: ollama-local
    name: "Local Ollama"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
    enabled: false
    priority: 99
    timeout: "120s"
    discovery:
      all_free: true
